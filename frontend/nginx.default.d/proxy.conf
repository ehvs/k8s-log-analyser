# Repassa /api/* para o service rag-api (mesma origem → sem CORS).
# A barra final no proxy_pass remove o prefixo /api: /api/ask → rag-api /ask.
location /api/ {
    proxy_pass http://rag-api:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 180s; # o SLM pode demorar para gerar a resposta
}
