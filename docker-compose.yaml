# Dev local com Podman:  podman compose up --build
# Depois, puxe os modelos dentro do container ollama:
#   podman exec -it ollama ollama pull llama3.2:3b
#   podman exec -it ollama ollama pull nomic-embed-text
services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  rag-api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      # Ollama expõe API compatível com OpenAI em /v1 (mesmo contrato do RamaLama).
      LLM_URL: http://ollama:11434
      EMBED_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      LLM_MODEL: llama3.2:3b
      EMBED_MODEL: nomic-embed-text
    depends_on:
      - ollama
      - qdrant

volumes:
  ollama-data:
  qdrant-data:
