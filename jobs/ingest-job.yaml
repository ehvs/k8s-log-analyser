# Job de ingestão: gera os embeddings da base e grava no Qdrant.
# FORA do path k8s/ de propósito: NÃO deve ser sincronizado pelo Argo CD.
# Rode manualmente, sob demanda, DEPOIS de Qdrant/RamaLama prontos e do ConfigMap:
#   oc -n slm-rag create configmap rag-data --from-file=data/
#   oc -n slm-rag apply -f jobs/ingest-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: rag-ingest
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ingest
          image: image-registry.openshift-image-registry.svc:5000/slm-rag/slm-rag-api:latest
          command: ["python", "ingest.py"]
          env:
            - name: EMBED_URL
              value: http://ramalama-embed:8080
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: EMBED_MODEL
              value: nomic-embed-text
            - name: DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          configMap:
            name: rag-data # oc -n slm-rag create configmap rag-data --from-file=data/
