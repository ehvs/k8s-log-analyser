# Qdrant como StatefulSet (identidade de rede estável + armazenamento persistente).
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  clusterIP: None # headless: exigido por StatefulSet
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
          env:
            # snapshots default (./snapshots) cai na raiz read-only sob restricted-v2.
            # Redireciona para dentro do PVC, que é gravável.
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: /qdrant/storage/snapshots
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 5
          # Compatível com a SCC restricted-v2. Não fixamos runAsUser/fsGroup:
          # o OpenShift injeta o UID e o fsGroup a partir da faixa do namespace.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
